<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Square Scale</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg: #f8f9fa;
            --header-h: 44px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            background: var(--bg);
            overflow: hidden;
            position: relative;
        }

        /* ── HEADER ── */
        #app-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-h);
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        #helpBtn {
            position: absolute;
            right: 15px;
            font-size: 12px;
            font-weight: bold;
            opacity: 0.8;
            cursor: pointer;
        }

        /* ── STAGE ── */
        #stage {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 40px 40px;
            touch-action: none;
        }

        /* ── FLOATING PANEL ── */
        #float-panel {
            position: fixed;
            bottom: 20px;
            left: 12px;
            right: 12px;
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 12px;
            z-index: 3000;
        }

        .input-wrapper { position: relative; margin-bottom: 10px; }

        /* Cleaned Input (No Ghost Text) */
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px; /* Prevents iOS auto-zoom */
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }

        #results-box {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 0; right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            max-height: 250px;
            overflow-y: auto;
            display: none;
        }

        .result-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
        }
        .result-item:active { background: #f0f7ff; }
        .result-title { font-weight: bold; font-size: 14px; }
        .result-sub { font-size: 11px; color: #888; margin-top: 2px; }

        .btn-row { display: flex; gap: 6px; }
        button {
            flex: 1;
            border: none;
            border-radius: 8px;
            padding: 10px 4px;
            color: white;
            font-weight: bold;
            font-size: 11px;
            background: var(--accent);
        }

        /* ── SHAPES ── */
        .shape {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid rgba(0,0,0,0.2);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transition: border-radius 0.3s ease;
        }
        .shape.square { border-radius: 4px; }
        .shape.circle { border-radius: 50%; }
        .shape.selected { border: 3px solid #000; z-index: 100; }
        .shape.highlight { border: 3px dashed var(--success); }

        .label {
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            padding: 4px;
        }

        /* ── LOADING & MODALS ── */
        #loading {
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #toast {
            position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 8px 16px; border-radius: 20px;
            font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 5000;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Loading regions...</p></div>

<div id="app-header">
    <span>Square Scale</span>
    <div id="helpBtn" onclick="toggleHelp()">Guide</div>
</div>

<div id="stage"></div>

<div id="float-panel">
    <div class="input-wrapper">
        <input type="text" id="entitySearch" placeholder="Search country, state, or city..." autocomplete="off">
        <div id="results-box"></div>
    </div>
    <div class="btn-row">
        <button id="actionBtn" style="background:var(--success)" onclick="handleMerge()">Merge Overlapping</button>
        <button id="modeBtn" style="background:#8e44ad" onclick="toggleMode()">Population</button>
        <button id="delBtn" style="background:var(--danger); display:none;" onclick="deleteSelected()">Delete</button>
        <button onclick="clearAll()" style="background:#7f8c8d">Clear</button>
    </div>
</div>

<div id="toast"></div>

<script>
    let masterData = [];
    let addedItems = [];
    let selectedIdx = null;
    let mode = 'area'; 

    const stage = document.getElementById('stage');
    const input = document.getElementById('entitySearch');
    const resultsBox = document.getElementById('results-box');

    async function init() {
        try {
            const res = await fetch('data.json');
            masterData = await res.json();
        } catch(e) { console.error(e); }
        document.getElementById('loading').style.display = 'none';
        
        input.addEventListener('input', e => {
            const val = e.target.value.toLowerCase();
            if(val.length < 2) { resultsBox.style.display = 'none'; return; }
            const matches = masterData.filter(d => 
                d.name.toLowerCase().includes(val) || 
                (d.aliases && d.aliases.some(a => a.toLowerCase().includes(val)))
            ).slice(0, 8);
            
            resultsBox.innerHTML = matches.map(m => `
                <div class="result-item" onpointerdown="addRegion('${encodeURIComponent(JSON.stringify(m))}')">
                    <span class="result-title">${m.name}</span>
                    <span class="result-sub">${m.type.replace('_',' ')}</span>
                </div>
            `).join('');
            resultsBox.style.display = 'block';
        });
    }

    function addRegion(encoded) {
        const data = JSON.parse(decodeURIComponent(encoded));
        const hue = Math.floor(Math.random() * 360);
        addedItems.push({
            ...data,
            color: `hsla(${hue}, 70%, 65%, 0.8)`,
            x: window.innerWidth / 2 - 40,
            y: window.innerHeight / 2 - 40
        });
        selectedIdx = addedItems.length - 1;
        input.value = '';
        resultsBox.style.display = 'none';
        render();
    }

    function getScale() {
        if (!addedItems.length) return 1;
        const max = Math.max(...addedItems.map(i => mode === 'population' ? (i.population || i.area) : i.area));
        const viewMin = Math.min(window.innerWidth, window.innerHeight);
        return (viewMin * 0.7) / Math.sqrt(max);
    }

    function render() {
        stage.innerHTML = '';
        const scale = getScale();
        
        addedItems.forEach((item, i) => {
            const val = mode === 'population' ? (item.population || item.area) : item.area;
            const size = Math.max(35, Math.sqrt(val) * scale);
            
            const div = document.createElement('div');
            div.className = `shape ${mode === 'population' ? 'circle' : 'square'} ${selectedIdx === i ? 'selected' : ''}`;
            div.style.width = size + 'px';
            div.style.height = size + 'px';
            div.style.backgroundColor = item.color;
            div.style.left = item.x + 'px';
            div.style.top = item.y + 'px';
            
            const labelVal = mode === 'population' 
                ? (item.population ? (item.population/1000000).toFixed(1)+'M' : 'N/A')
                : Math.round(item.area).toLocaleString() + ' km²';
            
            div.innerHTML = `<div class="label">${item.name}<br>${labelVal}</div>`;
            
            // OPTIMIZED DRAG LOGIC
            div.onpointerdown = e => {
                e.preventDefault();
                selectedIdx = i;
                
                // Highlight selection immediately without a full re-render
                document.querySelectorAll('.shape').forEach(s => s.classList.remove('selected'));
                div.classList.add('selected');
                
                const offset = { x: e.clientX - item.x, y: e.clientY - item.y };
                
                function move(me) {
                    item.x = me.clientX - offset.x;
                    item.y = me.clientY - offset.y;
                    // Only update the style, don't trigger a full render()
                    div.style.left = item.x + 'px';
                    div.style.top = item.y + 'px';
                }

                function up() {
                    window.removeEventListener('pointermove', move);
                    window.removeEventListener('pointerup', up);
                    render(); // Final cleanup render to sync everything
                }

                window.addEventListener('pointermove', move);
                window.addEventListener('pointerup', up);
            };
            
            stage.appendChild(div);
        });
        
        // Update UI buttons
        document.getElementById('delBtn').style.display = selectedIdx !== null ? 'block' : 'none';
        const actionBtn = document.getElementById('actionBtn');
        if(selectedIdx !== null && addedItems[selectedIdx].parts) {
            actionBtn.textContent = "Split Apart";
        } else {
            actionBtn.textContent = "Merge Overlapping";
        }
    }

    function handleMerge() {
        if(selectedIdx === null) return;
        const target = addedItems[selectedIdx];
        
        if(target.parts) {
            const parts = target.parts;
            addedItems.splice(selectedIdx, 1);
            addedItems.push(...parts);
            selectedIdx = null;
        } else {
            const scale = getScale();
            const s1 = Math.sqrt(target.area) * scale;
            const toMerge = [selectedIdx];
            const others = [];
            
            addedItems.forEach((item, i) => {
                if(i === selectedIdx) return;
                const s2 = Math.sqrt(item.area) * scale;
                const overlap = !(target.x + s1 < item.x || target.x > item.x + s2 || target.y + s1 < item.y || target.y > item.y + s2);
                if(overlap) toMerge.push(i);
                else others.push(item);
            });

            if(toMerge.length > 1) {
                const parts = [];
                toMerge.forEach(idx => {
                    if(addedItems[idx].parts) parts.push(...addedItems[idx].parts);
                    else parts.push(addedItems[idx]);
                });
                const totalArea = parts.reduce((s, p) => s + p.area, 0);
                const totalPop = parts.reduce((s, p) => s + (p.population || 0), 0);
                addedItems = [...others, {
                    name: "Combined Area",
                    area: totalArea,
                    population: totalPop,
                    color: target.color,
                    x: target.x, y: target.y,
                    parts: parts
                }];
                selectedIdx = addedItems.length - 1;
            } else {
                showToast("Overlap shapes first!");
            }
        }
        render();
    }

    function toggleMode() {
        mode = mode === 'area' ? 'population' : 'area';
        document.getElementById('modeBtn').textContent = mode === 'area' ? 'Population' : 'Area';
        render();
    }

    function deleteSelected() {
        if(selectedIdx !== null) {
            addedItems.splice(selectedIdx, 1);
            selectedIdx = null;
            render();
        }
    }

    function clearAll() { addedItems = []; selectedIdx = null; render(); }
    function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
    function toggleHelp() { showToast("Drag shapes to compare. Overlap and Merge to combine."); }

    init();
</script>
</body>
</html>
