<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Square Scale Pro</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; overflow: hidden; }
        
        header { background: var(--primary); color: white; padding: 10px; font-weight: bold; text-align: center; }
        
        .controls { display: flex; gap: 8px; padding: 12px; background: white; border-bottom: 1px solid #ddd; flex-wrap: wrap; justify-content: center; z-index: 10; }
        
        input { padding: 10px; border: 2px solid #ddd; border-radius: 8px; width: 100%; max-width: 250px; font-size: 16px; }
        
        button { padding: 10px 14px; cursor: pointer; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; font-size: 14px; }
        button.clear { background: var(--danger); }
        button.secondary { background: #95a5a6; }

        #stage { 
            flex-grow: 1; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            background-image: radial-gradient(#d1d1d1 0.5px, transparent 0.5px); 
            background-size: 30px 30px; 
            overflow: hidden; 
        }

        .square { 
            position: absolute;
            background: rgba(52, 152, 219, 0.5); 
            border: 1px solid rgba(0,0,0,0.3); 
            display: flex; align-items: center; justify-content: center; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer;
        }

        .label { position: absolute; bottom: 2px; width: 100%; text-align: center; font-size: min(12px, 2vw); font-weight: 700; color: #333; pointer-events: none; overflow: hidden; text-overflow: ellipsis; }
        
        #overlap-btn.active { background: #27ae60; }
    </style>
</head>
<body>

<header>Square Scale</header>

<div class="controls">
    <input list="entities" id="entityInput" placeholder="Search Country/State...">
    <datalist id="entities"></datalist>
    <button onclick="addSquare()">Add</button>
    <button id="overlap-btn" class="secondary" onclick="toggleOverlap()">Overlap Mode</button>
    <button class="clear" onclick="clearAll()">Clear</button>
</div>

<div id="stage"></div>

<script>
    let masterData = [];
    let addedItems = [];
    let overlapMode = false;
    const stage = document.getElementById('stage');

    async function loadData() {
        try {
            const countriesRes = await fetch('https://restcountries.com/v3.1/all?fields=name,area');
            const countries = await countriesRes.json();
            const countryList = countries.map(c => ({ name: c.name.common, area: c.area }));

            const states = [
                { name: "Nebraska (USA)", area: 200330 }, { name: "Florida (USA)", area: 170312 },
                { name: "California (USA)", area: 423970 }, { name: "Texas (USA)", area: 695662 },
                { name: "Hokkaido (Japan)", area: 83424 }, { name: "Ontario (Canada)", area: 1076000 }
            ];

            masterData = [...countryList, ...states].sort((a,b) => a.name.localeCompare(b.name));
            const list = document.getElementById('entities');
            masterData.forEach(item => {
                let opt = document.createElement('option');
                opt.value = item.name;
                list.appendChild(opt);
            });
        } catch(e) { console.error(e); }
    }

    function render() {
        stage.innerHTML = "";
        if (addedItems.length === 0) return;

        // AUTO-SCALING LOGIC
        // 1. Find the biggest area currently added
        const maxArea = Math.max(...addedItems.map(i => i.area));
        const maxSide = Math.sqrt(maxArea);
        
        // 2. Determine scale (use 80% of the smallest screen dimension)
        const stageDim = Math.min(stage.offsetWidth, stage.offsetHeight) * 0.8;
        const scale = stageDim / maxSide;

        addedItems.forEach((item, index) => {
            const side = Math.sqrt(item.area) * scale;
            const square = document.createElement('div');
            square.className = 'square';
            square.style.width = side + 'px';
            square.style.height = side + 'px';
            square.style.backgroundColor = item.color;
            
            // Positioning Logic
            if (overlapMode) {
                square.style.left = `calc(50% - ${side/2}px)`;
                square.style.top = `calc(50% - ${side/2}px)`;
            } else {
                // Simple horizontal line for side-by-side
                const totalWidth = addedItems.reduce((acc, curr) => acc + (Math.sqrt(curr.area) * scale) + 10, 0);
                let offset = (stage.offsetWidth - totalWidth) / 2;
                for(let i=0; i<index; i++) {
                    offset += (Math.sqrt(addedItems[i].area) * scale) + 10;
                }
                square.style.left = offset + 'px';
                square.style.top = `calc(50% - ${side/2}px)`;
            }

            // Remove on Double Click / Tap
            square.ondblclick = () => removeItem(index);
            
            square.innerHTML = `<div class="label">${item.name}</div>`;
            stage.appendChild(square);
        });
    }

    function addSquare() {
        const val = document.getElementById('entityInput').value;
        const item = masterData.find(i => i.name === val);
        if (item) {
            const hue = Math.floor(Math.random() * 360);
            addedItems.push({ ...item, color: `hsla(${hue}, 70%, 60%, 0.6)` });
            document.getElementById('entityInput').value = "";
            render();
        }
    }

    function removeItem(index) {
        addedItems.splice(index, 1);
        render();
    }

    function toggleOverlap() {
        overlapMode = !overlapMode;
        document.getElementById('overlap-btn').classList.toggle('active');
        render();
    }

    function clearAll() {
        addedItems = [];
        render();
    }

    window.onresize = render;
    loadData();
</script>

</body>
</html>
