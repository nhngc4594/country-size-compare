<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Square Scale Pro</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; overflow: hidden; }
        
        header { background: var(--primary); color: white; padding: 12px; font-weight: bold; text-align: center; font-size: 1.2rem; }
        
        .controls { display: flex; gap: 8px; padding: 12px; background: white; border-bottom: 1px solid #ddd; flex-wrap: wrap; justify-content: center; z-index: 10; }
        
        /* Mobile-friendly input */
        input { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 100%; max-width: 300px; font-size: 16px; } /* 16px prevents iOS zoom */
        
        button { padding: 12px 16px; cursor: pointer; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; font-size: 14px; }
        button.clear { background: var(--danger); }
        button.secondary { background: #95a5a6; }

        #stage { flex-grow: 1; position: relative; overflow: auto; display: flex; align-items: flex-end; padding: 50px; gap: 15px; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 40px 40px; }
        #stage.overlap-mode { align-items: center; justify-content: center; }
        #stage.overlap-mode .square { position: absolute; bottom: auto; }

        .square { 
            background: rgba(52, 152, 219, 0.5); 
            border: 2px solid rgba(0,0,0,0.2); 
            display: flex; align-items: center; justify-content: center; 
            transition: all 0.3s ease; 
            cursor: pointer;
            user-select: none;
        }
        .square:active { transform: scale(0.95); }
        .label { position: absolute; bottom: -22px; font-size: 10px; font-weight: 700; white-space: nowrap; color: #333; pointer-events: none; }
        
        .hint { font-size: 11px; color: #7f8c8d; width: 100%; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<header>Square Scale</header>

<div class="controls">
    <input list="entities" id="entityInput" placeholder="Search Country, State, Province...">
    <datalist id="entities"></datalist>
    <button onclick="addSquare()">Add</button>
    <button class="secondary" onclick="toggleOverlap()">Overlap</button>
    <button class="clear" onclick="clearAll()">Clear</button>
    <div class="hint">Double-tap a square to remove it</div>
</div>

<div id="stage"></div>

<script>
    let masterData = [];
    const stage = document.getElementById('stage');

    // loading a more comprehensive dataset including subnational areas
    async function loadData() {
        try {
            // Fetching a large curated list of countries and sub-regions
            const response = await fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json');
            // Note: Since raw area data for every tiny prefecture is massive, 
            // I'm using a reliable common helper for this specific version.
            const baseData = [
                { name: "Nebraska (USA)", area: 200330 },
                { name: "Florida (USA)", area: 170312 },
                { name: "California (USA)", area: 423970 },
                { name: "Texas (USA)", area: 695662 },
                { name: "Hokkaido (Japan)", area: 83424 },
                { name: "Honshu (Japan)", area: 227960 },
                { name: "Bavaria (Germany)", area: 70550 },
                { name: "Ontario (Canada)", area: 1076000 },
                { name: "Quebec (Canada)", area: 1542000 },
                { name: "Prince Edward Island (Canada)", area: 5660 }
            ];

            // Adding World Countries from an API
            const countriesRes = await fetch('https://restcountries.com/v3.1/all?fields=name,area');
            const countries = await countriesRes.json();
            const countryList = countries.map(c => ({ name: c.name.common, area: c.area }));

            masterData = [...countryList, ...baseData].sort((a,b) => a.name.localeCompare(b.name));
            
            const list = document.getElementById('entities');
            masterData.forEach(item => {
                let opt = document.createElement('option');
                opt.value = item.name;
                list.appendChild(opt);
            });
        } catch(e) { console.error("Data load failed", e); }
    }

    function addSquare() {
        const val = document.getElementById('entityInput').value;
        const item = masterData.find(i => i.name === val);
        
        if (item) {
            const side = Math.sqrt(item.area) * 0.4; 
            const square = document.createElement('div');
            square.className = 'square';
            square.style.width = side + 'px';
            square.style.height = side + 'px';
            
            const hue = Math.floor(Math.random() * 360);
            square.style.backgroundColor = `hsla(${hue}, 70%, 60%, 0.6)`;
            
            // DELETE LOGIC: Double click to remove
            square.addEventListener('dblclick', function() { this.remove(); });
            // For mobile "double tap"
            let lastTap = 0;
            square.addEventListener('touchend', function(e) {
                let currentTime = new Date().getTime();
                let tapLength = currentTime - lastTap;
                if (tapLength < 300 && tapLength > 0) {
                    this.remove();
                    e.preventDefault();
                }
                lastTap = currentTime;
            });

            square.innerHTML = `<div class="label">${item.name}</div>`;
            stage.appendChild(square);
            document.getElementById('entityInput').value = "";
        }
    }

    function toggleOverlap() { stage.classList.toggle('overlap-mode'); }
    function clearAll() { stage.innerHTML = ""; }

    loadData();
</script>

</body>
</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Scale: Country & Region Compare</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #ecf0f1; }
        header { background: var(--primary); color: white; padding: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; padding: 15px; background: white; border-bottom: 1px solid #ddd; align-items: center; }
        
        /* The Stage where squares live */
        #stage { flex-grow: 1; position: relative; overflow: auto; display: flex; align-items: flex-end; padding: 50px; gap: 20px; transition: all 0.5s ease; }
        
        /* Overlap Mode Styling */
        #stage.overlap-mode { align-items: center; justify-content: center; }
        #stage.overlap-mode .square { position: absolute; bottom: auto; margin: 0; }

        .square { background: rgba(52, 152, 219, 0.6); border: 2px solid var(--accent); position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .square:hover { background: rgba(52, 152, 219, 0.8); z-index: 100; }
        .label { position: absolute; bottom: -25px; font-size: 11px; font-weight: bold; white-space: nowrap; color: var(--primary); }
        
        button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: none; background: var(--accent); color: white; font-weight: bold; }
        button.secondary { background: #95a5a6; }
        button.clear { background: #e74c3c; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 250px; }
    </style>
</head>
<body>

<header>
    <strong>Square Scale</strong> | Compare Land Areas
</header>

<div class="controls">
    <input list="entities" id="entityInput" placeholder="Search Country, State, or Island...">
    <datalist id="entities"></datalist>
    <button onclick="addSquare()">Add Square</button>
    <button class="secondary" onclick="toggleOverlap()">Toggle Overlap</button>
    <button class="clear" onclick="clearAll()">Clear All</button>
</div>

<div id="stage" id="stage"></div>

<script>
    let masterData = [];
    const stage = document.getElementById('stage');

    // Fetching a larger dataset that includes states and islands
    // For this prototype, I'm using a curated list. In a pro version, we'd fetch a massive JSON.
    async function loadData() {
        // We'll start with a solid starter set of States + Countries
        const response = await fetch('https://raw.githubusercontent.com/samayo/country-json/master/src/country-by-surface-area.json');
        const countries = await response.json();
        
        // Manual additions for US States & Islands (Examples)
        const extras = [
            { country: "Hokkaido (Japan)", area: 83424 },
            { country: "Prince Edward Island (Canada)", area: 5660 },
            { country: "California (USA)", area: 423970 },
            { country: "Texas (USA)", area: 695662 },
            { country: "Rhode Island (USA)", area: 3144 },
            { country: "Tasmania (Australia)", area: 68401 }
        ];

        masterData = [...countries, ...extras];
        const list = document.getElementById('entities');
        masterData.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item.country;
            list.appendChild(opt);
        });
    }

    function addSquare() {
        const val = document.getElementById('entityInput').value;
        const item = masterData.find(i => i.country === val);
        
        if (item) {
            const side = Math.sqrt(item.area) * 0.4; // Scale 1px = 2.5km approx
            const square = document.createElement('div');
            square.className = 'square';
            square.style.width = side + 'px';
            square.style.height = side + 'px';
            
            // Random color for variety
            const hue = Math.floor(Math.random() * 360);
            square.style.backgroundColor = `hsla(${hue}, 70%, 50%, 0.5)`;
            square.style.borderColor = `hsla(${hue}, 70%, 40%, 1)`;

            square.innerHTML = `<div class="label">${item.country}</div>`;
            stage.appendChild(square);
            document.getElementById('entityInput').value = "";
        }
    }

    function toggleOverlap() {
        stage.classList.toggle('overlap-mode');
    }

    function clearAll() {
        stage.innerHTML = "";
    }

    loadData();
</script>

</body>
</html>
